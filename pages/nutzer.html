<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Nutzerverwaltung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Nutzerverwaltung</h1>
<p>Benutzerkonten verwalten, Rollen und Berechtigungen zuweisen</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="usersModalSearch" placeholder="Nach Benutzer, Rolle oder Rang suchen..." oninput="filterUsersModal()">
  </div>
  <button class="btn btn-success" onclick="openModal('addUser')"><i class="fas fa-plus"></i> Nutzer hinzufügen</button>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>Benutzer</th><th>Rolle</th><th>Rang</th><th>Status</th><th>Aktion</th></tr></thead>
    <tbody id="usersViewTableBody"></tbody>
  </table>
</div>
</div>

<div id="addUserModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2>Nutzer hinzufügen</h2><button class="modal-close" onclick="closeModal('addUser')">×</button></div>
<form onsubmit="addUser(event)">
<div class="form-group"><label>Benutzername</label><input type="text" id="newUsername" required></div>
<div class="form-group"><label>Rolle</label><select id="newRole" required></select></div>
<div class="form-group"><label>Rang</label><select id="newJobRank"></select></div>
<div class="form-group"><label>Passwort</label><div style="display:flex;gap:8px"><input type="text" id="newPassword" readonly style="flex:1"><button type="button" class="btn btn-primary btn-small" onclick="generateNewPassword()">Generieren</button></div></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Erstellen</button>
</form>
</div>
</div>

<div id="userPermissionsModal" class="modal">
<div class="modal-content" style="max-width:500px">
<div class="modal-header"><h2 id="userPermissionsTitle">🔑 Berechtigungen</h2><button class="modal-close" onclick="closeViewModal('userPermissions')">×</button></div>
<div id="userPermissionsBody" style="padding:8px 0"></div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderUsersView();
            populateJobRankDropdown();
        });
        subPageRefreshCallback = () => { renderUsersView(); };
    }, 1000);
});
window.addEventListener('beforeunload', () => { stopAutoSync(); });
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
