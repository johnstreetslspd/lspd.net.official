<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Beweismittelverwaltung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Beweismittelverwaltung</h1>
<p>Beweismittel erfassen, zuordnen und verwalten</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="evidenceModalSearch" placeholder="Nach AZ, Beschreibung oder Ort suchen..." oninput="filterEvidenceModal()">
  </div>
  <button class="btn btn-success" onclick="openModal('addEvidence')"><i class="fas fa-plus"></i> Beweismittel hinzufügen</button>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>AZ</th><th>Typ</th><th>Bezeichnung</th><th>Ort</th><th>Strafakte</th><th>Vergehen</th><th>Aktion</th></tr></thead>
    <tbody id="evidenceViewTableBody"></tbody>
  </table>
</div>
</div>

<div id="addEvidenceModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2>Beweismittel hinzufügen</h2><button class="modal-close" onclick="closeModal('addEvidence')">×</button></div>
<form onsubmit="addEvidence(event)">
<div class="form-group"><label>Beweismittelart</label><select id="evType" required><option value="Waffe">🔫 Waffe</option><option value="Drogen">💊 Drogen</option><option value="Sonstiges">📦 Sonstiges</option></select></div>
<div class="form-group"><label>Bezeichnung</label><input type="text" id="evName" required placeholder="z.B. Glock 17, Kokain, Mobiltelefon..."></div>
<div class="form-group"><label>Beschreibung</label><textarea id="evDesc" required></textarea></div>
<div class="form-group"><label>Ort / Fundort</label><input type="text" id="evLocation" required></div>
<div class="form-group"><label>Zugehörige Strafakte (AZ)</label><select id="evCitationAZ"><option value="">-- Keine Strafakte zuordnen --</option></select></div>
<div class="form-group"><label>Vergehen</label><div id="evVergehen" style="display:flex;flex-wrap:wrap;gap:2px;max-height:150px;overflow-y:auto;padding:6px;background:rgba(0,102,204,0.05);border:1px solid rgba(0,102,204,0.2);border-radius:4px"></div></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Erstellen</button>
</form>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderEvidenceView();
            populateEvidenceModal();
        });
        subPageRefreshCallback = () => { renderEvidenceView(); };
    }, 1000);
});
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
