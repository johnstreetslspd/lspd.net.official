<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Anzeige Details</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="anzeigen.html"><i class="fas fa-arrow-left"></i> Anzeigen</a>
<a href="../mitarbeiter-portal.html"><i class="fas fa-th-large"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1><i class="fas fa-exclamation-triangle"></i> Anzeige – Details</h1>
<p>Anzeige einsehen und Notizen hinzufügen</p>
</header>

<div class="container">
<div id="chargeDetailContent" style="padding:10px 0">
<p style="text-align:center;color:var(--text-secondary);padding:40px">Laden...</p>
</div>
<div style="margin-top:20px;border-top:1px solid rgba(0,102,204,0.2);padding-top:16px">
  <div style="font-size:1em;font-weight:700;color:var(--secondary);margin-bottom:10px"><i class="fas fa-clipboard-list"></i> Notizen & Ermittlungen</div>
  <div id="chargeNotesList" style="margin-bottom:10px;display:grid;gap:8px"></div>
  <div style="display:flex;gap:8px">
    <textarea id="chargeNoteInput" placeholder="Notiz / Ermittlungsschritt hinzufügen..." style="flex:1;background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary);padding:8px;border-radius:4px;font-size:0.9em;resize:vertical;min-height:60px"></textarea>
    <button class="btn btn-primary" onclick="addChargeNote()" style="align-self:flex-end">➕ Hinzufügen</button>
  </div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const id = Number(params.get('id'));
        initSubPage(() => {
            if (id) renderChargeDetailPage(id);
        });
        subPageRefreshCallback = () => {
            if (id) renderChargeDetailPage(id);
        };
    }, 1000);
});
</script>
</body>
</html>
