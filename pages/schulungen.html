<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Schulungen & Ausbildung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Schulungen & Ausbildung</h1>
<p>Schulungen planen, verwalten und Teilnehmer koordinieren</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="trainingModalSearch" placeholder="Nach Titel, Ersteller oder Rang suchen..." oninput="filterTrainingModal()">
  </div>
  <button id="trainingAddBtn" class="btn btn-success" onclick="openModal('addTraining')" style="display:none"><i class="fas fa-plus"></i> Schulung erstellen</button>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>Titel</th><th>Ersteller</th><th>Min. Rang</th><th>Datum</th><th>Teilnehmer</th><th>Aktion</th></tr></thead>
    <tbody id="trainingViewTableBody"></tbody>
  </table>
</div>
</div>

<div id="addTrainingModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2><i class="fas fa-book"></i> Schulung erstellen</h2><button class="modal-close" onclick="closeModal('addTraining')">×</button></div>
<form onsubmit="addTraining(event)">
<div class="form-group"><label>Titel der Schulung</label><input type="text" id="trainTitle" required placeholder="z.B. Grundausbildung Streifendienst"></div>
<div class="form-group"><label>Ab welchem Rang</label><select id="trainMinRank" required></select></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label>Datum (optional)</label><input type="date" id="trainDate"></div>
<div class="form-group"><label>Uhrzeit (optional)</label><input type="time" id="trainTime"></div>
</div>
<div class="form-group"><label>Google Docs Link (optional)</label><input type="url" id="trainGoogleDocs" placeholder="https://docs.google.com/document/d/..."></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Schulung erstellen</button>
</form>
</div>
</div>

<div id="trainingDetailModal" class="modal">
<div class="modal-content" style="max-width:800px;max-height:90vh;overflow-y:auto">
<div class="modal-header"><h2><i class="fas fa-book-open"></i> Schulung – Details</h2><button class="modal-close" onclick="document.getElementById('trainingDetailModal').classList.remove('show')">×</button></div>
<div id="trainingDetailContent" style="padding:10px 0"></div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderTrainingView();
            populateTrainingRankDropdown();
            const btn = document.getElementById('trainingAddBtn');
            if (btn) btn.style.display = canAccess('training') ? '' : 'none';
        });
        subPageRefreshCallback = () => { renderTrainingView(); };
    }, 1000);
});
window.addEventListener('beforeunload', () => { stopAutoSync(); });
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
