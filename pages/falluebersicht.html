<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Fallübersicht</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Fallübersicht</h1>
<p>Alle Fälle eines Bürgers auf einen Blick</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="fallubersichtSearch" placeholder="Nach Bürger suchen..." oninput="filterFallubersicht()">
  </div>
</div>
<div id="fallubersichtContent" style="padding:10px 0"></div>
</div>

<div id="citationDetailModal" class="modal">
<div class="modal-content" style="max-width:750px;max-height:90vh;overflow-y:auto">
<div class="modal-header"><h2><i class="fas fa-gavel"></i> Strafakte – Details</h2><button class="modal-close" onclick="document.getElementById('citationDetailModal').classList.remove('show')">×</button></div>
<div id="citationDetailContent" style="padding:10px 0"></div>
</div>
</div>

<div id="chargeDetailModal" class="modal">
<div class="modal-content" style="max-width:750px;max-height:90vh;overflow-y:auto">
<div class="modal-header"><h2><i class="fas fa-exclamation-triangle"></i> Anzeige – Details</h2><button class="modal-close" onclick="document.getElementById('chargeDetailModal').classList.remove('show')">×</button></div>
<div id="chargeDetailContent" style="padding:10px 0"></div>
<div style="margin-top:20px;border-top:1px solid rgba(0,102,204,0.2);padding-top:16px">
  <div style="font-size:1em;font-weight:700;color:var(--secondary);margin-bottom:10px"><i class="fas fa-clipboard-list"></i> Notizen & Ermittlungen</div>
  <div id="chargeNotesList" style="margin-bottom:10px;display:grid;gap:8px"></div>
  <div style="display:flex;gap:8px">
    <textarea id="chargeNoteInput" placeholder="Notiz / Ermittlungsschritt hinzufügen..." style="flex:1;background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary);padding:8px;border-radius:4px;font-size:0.9em;resize:vertical;min-height:60px"></textarea>
    <button class="btn btn-primary" onclick="addChargeNote()" style="align-self:flex-end">➕ Hinzufügen</button>
  </div>
</div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderFallubersicht();
        });
        subPageRefreshCallback = () => { renderFallubersicht(); };
    }, 1000);
});
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
