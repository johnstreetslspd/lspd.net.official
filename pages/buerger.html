<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Bürgerverwaltung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Bürgerverwaltung</h1>
<p>Bürgerdaten verwalten, Akten einsehen und bearbeiten</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="citizensModalSearch" placeholder="Nach Name, Telefon oder Adresse suchen..." oninput="filterCitizensModal()">
  </div>
  <button class="btn btn-success" onclick="openModal('addCitizen')"><i class="fas fa-plus"></i> Bürger hinzufügen</button>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>Name</th><th>Telefon</th><th>Adresse</th><th>Status</th><th>Akten</th><th>Aktion</th></tr></thead>
    <tbody id="citizensViewTableBody"></tbody>
  </table>
</div>
</div>

<div id="addCitizenModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2>Bürger hinzufügen</h2><button class="modal-close" onclick="closeModal('addCitizen')">×</button></div>
<form onsubmit="addCitizen(event)">
<div class="form-group"><label>Name</label><input type="text" id="ctName" required></div>
<div class="form-group"><label>Telefon</label><input type="tel" id="ctPhone" required></div>
<div class="form-group"><label>Adresse</label><input type="text" id="ctAddress" required></div>
<div class="form-group"><label>Status</label><select id="ctStatus"><option>Aktiv</option><option>Inaktiv</option></select></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Erstellen</button>
</form>
</div>
</div>

<div id="citizenDetailModal" class="modal">
<div class="modal-content" style="max-width:700px;max-height:90vh;overflow-y:auto">
<div class="modal-header"><h2><i class="fas fa-user-shield"></i> Bürgerakte</h2><button class="modal-close" onclick="document.getElementById('citizenDetailModal').classList.remove('show')">×</button></div>
<div id="citizenDetailContent" style="padding:10px 0"></div>
<div style="margin-top:20px;border-top:1px solid rgba(0,102,204,0.2);padding-top:16px">
  <div style="font-size:1em;font-weight:700;color:var(--secondary);margin-bottom:10px"><i class="fas fa-clipboard-list"></i> Notizen</div>
  <div id="citizenNotesList" style="margin-bottom:10px;display:grid;gap:8px"></div>
  <div style="display:flex;gap:8px">
    <textarea id="citizenNoteInput" placeholder="Notiz hinzufügen..." style="flex:1;background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary);padding:8px;border-radius:4px;font-size:0.9em;resize:vertical;min-height:60px"></textarea>
    <button class="btn btn-primary" onclick="addCitizenNote()" style="align-self:flex-end">➕ Hinzufügen</button>
  </div>
</div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderCitizensView();
        });
        subPageRefreshCallback = () => { renderCitizensView(); };
    }, 1000);
});
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
