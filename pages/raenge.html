<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Ränge / Dienstgrade</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Ränge / Dienstgrade</h1>
<p>Dienstgrade erstellen, bearbeiten und verwalten</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="ranksModalSearch" placeholder="Nach Name, Abteilung oder Beschreibung suchen..." oninput="filterRanksModal()">
  </div>
  <button class="btn btn-success" onclick="openModal('addRank')"><i class="fas fa-plus"></i> Rang hinzufügen</button>
</div>
<div class="table-container">
  <table>
    <thead><tr><th>Rang</th><th>Farbe</th><th>Abteilung</th><th>Prio</th><th>Beschreibung</th><th>Aktion</th></tr></thead>
    <tbody id="ranksViewTableBody"></tbody>
  </table>
</div>
</div>

<div id="addRankModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2><i class="fas fa-award"></i> Rang hinzufügen</h2><button class="modal-close" onclick="closeModal('addRank')">×</button></div>
<form onsubmit="addRank(event)">
<div class="form-group"><label>Name</label><input type="text" id="rankName" required placeholder="z.B. Sergeant"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label>Kürzel</label><input type="text" id="rankAbbreviation" placeholder="z.B. SGT" maxlength="6"></div>
<div class="form-group"><label>Priorität (0–100)</label><input type="number" id="rankPriority" value="0" min="0" max="100"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="form-group"><label>Farbe</label><input type="color" id="rankColor" value="#0066cc" required></div>
<div class="form-group"><label>Icon (Font Awesome)</label><input type="text" id="rankIcon" value="fas fa-award" placeholder="fas fa-award"></div>
</div>
<div class="form-group"><label>Abteilung</label><select id="rankDepartment"><option value="">– Keine Abteilung –</option></select></div>
<div class="form-group"><label>Beschreibung</label><textarea id="rankDesc" placeholder="Beschreibung des Rangs..."></textarea></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Erstellen</button>
</form>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderRanksView();
            populateRankDepartmentDropdown();
        });
        subPageRefreshCallback = () => { renderRanksView(); };
    }, 1000);
});
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
