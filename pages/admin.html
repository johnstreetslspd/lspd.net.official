<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Admin Panel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Admin Panel</h1>
<p>Modulare Verwaltung – Rollen, Ränge, Abteilungen & Statistiken</p>
</header>

<div class="container">
<div style="padding:10px 0">

<!-- Tab-Navigation -->
<div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid rgba(0,102,204,0.2);padding-bottom:10px">
<button id="adminTab_roles" class="btn btn-primary btn-small" onclick="setAdminTab('roles')" style="border-radius:4px">🎭 Rollen</button>
<button id="adminTab_ranks" class="btn btn-small" onclick="setAdminTab('ranks')" style="border-radius:4px;background:rgba(0,102,204,0.15);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary)">🏅 Ränge</button>
<button id="adminTab_departments" class="btn btn-small" onclick="setAdminTab('departments')" style="border-radius:4px;background:rgba(0,102,204,0.15);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary)">🏢 Abteilungen</button>
<button id="adminTab_stats" class="btn btn-small" onclick="setAdminTab('stats')" style="border-radius:4px;background:rgba(0,102,204,0.15);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary)">📊 Statistiken</button>
</div>

<!-- Tab: Rollen -->
<div id="adminPanel_roles" style="display:block">
<h3 style="color:var(--secondary);margin:0 0 10px 0">🎭 Rollen & Berechtigungen</h3>
<div id="roleEditorPanel" style="margin-bottom:20px;font-size:0.85em;background:rgba(0,102,204,0.1);padding:15px;border-radius:8px"></div>
</div>

<!-- Tab: Ränge -->
<div id="adminPanel_ranks" style="display:none">
<h3 style="color:var(--secondary);margin:0 0 10px 0">🏅 Dienstgrade verwalten</h3>
<div id="adminRanksPanel" style="margin-bottom:20px;font-size:0.85em;background:rgba(0,102,204,0.1);padding:15px;border-radius:8px"></div>
</div>

<!-- Tab: Abteilungen -->
<div id="adminPanel_departments" style="display:none">
<h3 style="color:var(--secondary);margin:0 0 10px 0">🏢 Abteilungen verwalten</h3>
<div id="adminDepartmentsPanel" style="margin-bottom:20px;font-size:0.85em;background:rgba(0,102,204,0.1);padding:15px;border-radius:8px"></div>
</div>

<!-- Tab: Statistiken -->
<div id="adminPanel_stats" style="display:none">
<h3 style="color:var(--secondary);margin:0 0 10px 0">📊 Statistiken</h3>
<div id="statsPanel" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px"></div>
</div>

<div style="border-top:1px solid rgba(0,102,204,0.2);padding-top:12px;margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn btn-success" onclick="exportAdminData()">💾 Export</button>
<button class="btn btn-primary" onclick="window.location.href='../mitarbeiter-portal.html'">✓ Fertig</button>
</div>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            openAdminPanel();
            setAdminTab('roles');
        });
        subPageRefreshCallback = () => { openAdminPanel(); };
    }, 1000);
});
window.addEventListener('beforeunload', () => { stopAutoSync(); });
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
