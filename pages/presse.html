<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Presseabteilung</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="../mitarbeiter-portal.html"><i class="fas fa-arrow-left"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1>Presseabteilung</h1>
<p>Pressemitteilungen und Nachrichten verwalten</p>
</header>

<div class="container">
<div class="page-toolbar">
  <div class="search-box">
    <i class="fas fa-search" style="color:var(--secondary)"></i>
    <input type="text" id="pressModalSearch" placeholder="Nach Titel, Inhalt oder Autor suchen..." oninput="filterPressModal()">
  </div>
  <button class="btn btn-success" onclick="openModal('addPress')"><i class="fas fa-plus"></i> Nachricht erstellen</button>
</div>
<div id="pressArticlesContainer" style="display:grid;gap:20px;padding:10px"></div>
</div>

<div id="addPressModal" class="modal">
<div class="modal-content" style="max-width:700px">
<div class="modal-header"><h2>Nachricht erstellen</h2><button class="modal-close" onclick="closeModal('addPress')">×</button></div>
<form onsubmit="addPressArticle(event)">
<div class="form-group"><label>Titel (Headline)</label><input type="text" id="pressTitle" required></div>
<div class="form-group"><label>Untertitel</label><input type="text" id="pressSubtitle" placeholder="z.B. Polizei meldet..."></div>
<div class="form-group"><label>Inhalt</label><textarea id="pressContent" required style="min-height:120px"></textarea></div>
<div class="form-group"><label>Bild hochladen</label><input type="file" id="pressImageFile" accept="image/*" onchange="handlePressImageFile(event)" style="background:rgba(0,102,204,0.1);border:1px solid rgba(0,102,204,0.3);color:var(--text-primary);padding:8px;border-radius:6px;width:100%;cursor:pointer"><input type="hidden" id="pressImage"><div id="pressImagePreview" style="margin-top:8px"></div><small style="color:var(--text-secondary);font-size:0.8em">Bild wird dauerhaft gespeichert (max. 2MB, wird automatisch komprimiert)</small></div>
<div class="form-group"><label>Autor</label><input type="text" id="pressAuthor" required placeholder="Name des Beamten"></div>
<button type="submit" class="btn btn-success" style="width:100%;margin-top:10px">Veröffentlichen</button>
</form>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        initSubPage(() => {
            renderPressArticles();
        });
        subPageRefreshCallback = () => { renderPressArticles(); };
    }, 1000);
});
window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('show'); };
</script>
</body>
</html>
