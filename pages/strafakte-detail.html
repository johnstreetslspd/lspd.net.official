<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSPD - Strafakte Details</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="../shared-styles.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../db.js"></script>
<script src="../mitarbeiter-logic.js"></script>
</head>
<body>
<header>
<div class="header-top">
<div class="header-left">
<div class="logo"><i class="fas fa-shield-alt"></i> LSPD</div>
<nav class="header-nav">
<a href="strafakten.html"><i class="fas fa-arrow-left"></i> Strafakten</a>
<a href="../mitarbeiter-portal.html"><i class="fas fa-th-large"></i> Dashboard</a>
<a href="../portal-hub.html"><i class="fas fa-home"></i></a>
</nav>
</div>
<div class="header-right">
<div class="user-info">
<div style="color:var(--secondary);font-weight:700;font-size:0.9em" id="currentUser">-</div>
<div class="user-role" id="userRole">-</div>
</div>
<button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<h1><i class="fas fa-gavel"></i> Strafakte – Details</h1>
<p>Strafakte einsehen und bearbeiten</p>
</header>

<div class="container">
<div id="citationDetailContent" style="padding:10px 0">
<p style="text-align:center;color:var(--text-secondary);padding:40px">Laden...</p>
</div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const id = Number(params.get('id'));
        initSubPage(() => {
            if (id) renderCitationDetailPage(id);
        });
        subPageRefreshCallback = () => {
            if (id) renderCitationDetailPage(id);
        };
    }, 1000);
});
</script>
</body>
</html>
